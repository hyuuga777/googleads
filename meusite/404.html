<style>
        /* --- CSS BÁSICO GERAL --- */
        body {
            font-family: sans-serif;
            background-color: #f4f4f9;
            height: 200vh;
            margin: 0;
            padding: 20px;
        }

        /* --- CONFIGURAÇÃO GERAL DOS BOTÕES REDONDOS --- */
        .floating-btn {
            position: fixed;
            right: 20px; /* Alinhados à direita */
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: white;
            font-size: 24px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            transition: transform 0.3s, background-color 0.3s;
            border: none;
            cursor: pointer;
            z-index: 1000;
        }

        .floating-btn:hover {
            transform: scale(1.1);
        }

        /* --- 1. BOTÃO SUBIR (BASE) --- */
        #to-top {
            bottom: 20px;
            background-color: #333;
            z-index: 900;
        }
        #to-top:hover { background-color: #000; }

        /* --- 2. BOTÃO WHATSAPP (MEIO) --- */
        #whatsapp-float {
            bottom: 85px; /* 20px (margem) + 50px (btn1) + 15px (espaço) */
            background-color: #25D366;
            z-index: 950;
        }
        #whatsapp-float:hover { background-color: #128c7e; }

        /* --- 3. MENU FLUTUANTE (TOPO) --- */
        
        /* Container do Menu (Fica acima do WhatsApp) */
        .floating-menu-container {
            position: fixed;
            bottom: 150px; /* 85px (btn2) + 50px (btn2) + 15px (espaço) */
            right: 20px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: flex-end; /* Alinha itens à direita */
        }

        /* O Botão Toggle (+) dentro do container */
        .menu-toggle-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background-color: #8e44ad; /* Roxo */
            color: white;
            border: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), background-color 0.3s;
        }

        .menu-toggle-btn:hover {
            transform: scale(1.1);
        }

        /* --- LISTA DE ITENS DO MENU --- */
        .menu-items {
            list-style: none;
            margin: 0;
            padding: 0;
            margin-bottom: 15px; /* Espaço entre a lista e o botão + */
            opacity: 0;
            visibility: hidden;
            transform: translateY(20px);
            transition: all 0.3s ease;
        }

        .menu-items li {
            margin-bottom: 10px;
            display: flex;
            justify-content: flex-end;
            align-items: center;
        }

        .menu-link {
            display: flex;
            align-items: center;
            text-decoration: none;
            color: #333;
        }

        /* Ícones brancos da lista */
        .menu-link i {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            color: #8e44ad;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            transition: background 0.2s;
        }

        .menu-link:hover i { background-color: #f0f0f0; }

        /* Labels (Textos) */
        .menu-link .label {
            margin-right: 10px;
            background-color: #333;
            color: white;
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 12px;
            opacity: 0;
            transform: translateX(10px);
            transition: all 0.2s;
            pointer-events: none;
        }

        .menu-link:hover .label {
            opacity: 1;
            transform: translateX(0);
        }

        /* --- ESTADOS ATIVOS (Clique no +) --- */
        .floating-menu-container.active .menu-toggle-btn {
            transform: rotate(135deg);
            background-color: #c0392b; 
        }

        .floating-menu-container.active .menu-items {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }
    </style>
